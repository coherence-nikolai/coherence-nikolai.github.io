<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tone Loom</title>
  <desc id="desc">A calm luminous spiral orb for Tone Loom.</desc>
  <defs>
    <radialGradient id="backdrop" cx="50%" cy="45%" r="76%">
      <stop offset="0%" stop-color="#4d3827"/>
      <stop offset="42%" stop-color="#21100a"/>
      <stop offset="100%" stop-color="#070202"/>
    </radialGradient>
    <radialGradient id="orbFill" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#f2dfba" stop-opacity=".9"/>
      <stop offset="26%" stop-color="#a88755" stop-opacity=".62"/>
      <stop offset="68%" stop-color="#2d1d17" stop-opacity=".86"/>
      <stop offset="100%" stop-color="#100706"/>
    </radialGradient>
    <radialGradient id="coreLight" cx="46%" cy="46%" r="56%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity=".95"/>
      <stop offset="36%" stop-color="#efd8aa" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#efd8aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="threadLight" x1="28%" y1="70%" x2="72%" y2="30%">
      <stop offset="0%" stop-color="#d6b878" stop-opacity=".72"/>
      <stop offset="42%" stop-color="#fff8e9"/>
      <stop offset="100%" stop-color="#f1d59b" stop-opacity=".86"/>
    </linearGradient>
    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#backdrop)"/>
  <circle cx="512" cy="512" r="372" fill="#f1d8a2" opacity=".12" filter="url(#wideGlow)"/>
  <circle cx="512" cy="512" r="312" fill="url(#orbFill)"/>
  <circle cx="512" cy="512" r="210" fill="url(#coreLight)" opacity=".78"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="512" cy="512" r="315" stroke="#fff4df" stroke-width="13" opacity=".92"/>
    <circle cx="512" cy="512" r="242" stroke="#fff4df" stroke-width="5" opacity=".24"/>
    <circle cx="512" cy="512" r="150" stroke="#fff4df" stroke-width="4" opacity=".16"/>
    <path d="M512 523c-17-9-17-37 4-46 31-13 65 9 67 43 3 49-42 85-91 72-64-17-92-91-55-147 49-73 160-73 221-7 78 84 42 226-70 278" stroke="#fff7e4" stroke-width="34" opacity=".18"/>
    <path d="M512 523c-17-9-17-37 4-46 31-13 65 9 67 43 3 49-42 85-91 72-64-17-92-91-55-147 49-73 160-73 221-7 78 84 42 226-70 278" stroke="#fff7e4" stroke-width="19" opacity=".9" filter="url(#softGlow)"/>
    <path d="M512 523c-17-9-17-37 4-46 31-13 65 9 67 43 3 49-42 85-91 72-64-17-92-91-55-147 49-73 160-73 221-7 78 84 42 226-70 278" stroke="url(#threadLight)" stroke-width="11" opacity=".98"/>
    <path d="M315 514c79-58 157-58 236 0s157 58 236 0" stroke="#fff4df" stroke-width="6" opacity=".12"/>
    <path d="M512 316c58 79 58 157 0 236s-58 157 0 236" stroke="#fff4df" stroke-width="6" opacity=".12"/>
  </g>

  <g fill="#fff8e8" filter="url(#softGlow)">
    <circle cx="438" cy="408" r="18"/>
    <circle cx="582" cy="459" r="14"/>
    <circle cx="470" cy="594" r="13"/>
    <circle cx="654" cy="604" r="17"/>
  </g>
  <g fill="none" stroke="#fff8e8" stroke-width="6" opacity=".84">
    <circle cx="438" cy="408" r="30"/>
    <circle cx="582" cy="459" r="23"/>
    <circle cx="470" cy="594" r="22"/>
    <circle cx="654" cy="604" r="28"/>
  </g>
</svg>
