<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tone Glyph - Living Glyph Creator</title>
  <meta name="description" content="Tone Glyph is a living glyph creator for sacred geometry, tone, breath, ritual, and personal symbolic form.">
  <meta name="theme-color" content="#05070a">
  <link rel="canonical" href="https://coherence-nikolai.app/toneglyph/">
  <meta property="og:title" content="Tone Glyph">
  <meta property="og:description" content="A living glyph creator for sacred geometry, breath, ritual, play, and personal symbolic form.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://coherence-nikolai.app/toneglyph/">
  <meta property="og:image" content="https://coherence-nikolai.app/toneglyph/icon.svg">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=20260610-mobile-stage">
</head>
<body data-mode="ritual" data-view="living" data-control-tab="form" data-action="none">
  <main class="app-shell">
    <section class="stage" aria-label="Tone Glyph instrument">
      <canvas id="glyph-canvas" class="glyph-canvas" aria-label="Interactive Tone Glyph creator"></canvas>
      <div class="orbital-shade" aria-hidden="true"></div>
    </section>

    <header class="topbar">
      <a class="brand" href="/" aria-label="Coherence Nikolai home">
        <span class="brand-mark" aria-hidden="true">TG</span>
        <span>
          <strong>Tone Glyph</strong>
          <small>Living glyph creator</small>
        </span>
      </a>
      <div class="topbar-actions">
        <p id="render-status" class="render-status" aria-live="polite">Preparing field</p>
        <div class="view-toolbar" aria-label="View controls">
          <button id="form3d-button" class="view-action" type="button" aria-pressed="false">3D</button>
          <button id="true-view-button" class="view-action" type="button" aria-pressed="false">True Glyph</button>
          <button id="move-button" class="view-action" type="button" aria-pressed="false">Move</button>
          <button id="front-button" class="view-action" type="button">Front</button>
        </div>
      </div>
    </header>

    <nav class="mode-rail" aria-label="Tone Glyph modes">
      <button class="mode-button" type="button" data-mode="kasina">Kasina</button>
      <button class="mode-button" type="button" data-mode="breath">Breath</button>
      <button class="mode-button" type="button" data-mode="play">Play</button>
      <button class="mode-button" type="button" data-mode="ritual">Ritual</button>
      <button class="mode-button" type="button" data-mode="glyph">Glyph</button>
    </nav>

    <nav id="action-rail" class="action-rail" aria-label="Tone Glyph actions">
      <button class="action-button" type="button" data-action-button="tune" aria-expanded="false">Tune</button>
      <button class="action-button" type="button" data-action-button="shape" aria-expanded="false">Shape</button>
      <button class="action-button primary-action-button" type="button" data-action-button="seal" aria-expanded="false">Seal</button>
      <button class="action-button" type="button" data-action-button="save" aria-expanded="false">Save</button>
    </nav>
    <p id="stage-hint" class="stage-hint">Drag to turn. Hold to listen. Seal when it feels right.</p>

    <section id="control-drawer" class="control-dock" aria-label="Tone Glyph creator controls" hidden>
      <div class="drawer-head">
        <div>
          <p class="drawer-kicker">Tone Glyph</p>
          <h2 id="drawer-title">Tune</h2>
        </div>
        <button id="drawer-close-button" class="drawer-close" type="button" aria-label="Close controls">Close</button>
      </div>
      <div id="control-tabs" class="control-tabs" aria-label="Creator sections">
        <button class="control-tab" type="button" data-control-tab="form">Form</button>
        <button class="control-tab" type="button" data-control-tab="matter">Matter</button>
        <button class="control-tab" type="button" data-control-tab="tone">Tone</button>
        <button class="control-tab" type="button" data-control-tab="motion">Motion</button>
        <button class="control-tab" type="button" data-control-tab="ritual">Ritual</button>
        <button class="control-tab" type="button" data-control-tab="layers">Layers</button>
      </div>

      <div class="panel ritual-panel">
        <label class="input-label" for="intention-input">Intention</label>
        <textarea id="intention-input" rows="2" maxlength="160" placeholder="Name what this glyph is holding"></textarea>
        <div class="action-row">
          <button id="seal-button" class="primary-action" type="button">Seal Ritual</button>
          <button id="clear-button" class="quiet-action" type="button">Clear</button>
        </div>
      </div>

      <div class="panel creator-panel">
        <span class="input-label">Glyph</span>
        <div id="family-options" class="family-grid" aria-label="Glyph families"></div>
        <div class="seed-library-head">
          <div>
            <span class="seed-library-title">Shape Library</span>
            <p id="seed-library-count" class="seed-library-count">0 shapes</p>
          </div>
          <button id="explore-seed-button" class="quiet-action explore-seed-button" type="button">Explore Next</button>
        </div>
        <div id="seed-categories" class="seed-category-row" aria-label="Shape discovery categories"></div>
        <div id="seed-options" class="seed-grid" aria-label="Shape library"></div>
        <div class="select-row">
          <label class="native-seed-select">
            <span>Seed</span>
            <select id="seed-select" aria-label="Glyph seed"></select>
          </label>
          <label>
            <span>Action</span>
            <select id="action-select" aria-label="Ritual action"></select>
          </label>
        </div>
      </div>

      <div class="panel instrument-panel">
        <span class="input-label">Instrument</span>
        <div class="select-row">
          <label>
            <span>Type</span>
            <select id="shape-type-select" aria-label="Shape type"></select>
          </label>
          <label>
            <span>Material</span>
            <select id="material-select" aria-label="Material"></select>
          </label>
          <label>
            <span>Motion</span>
            <select id="motion-select" aria-label="Motion preset"></select>
          </label>
          <label>
            <span>Zoom</span>
            <input id="zoom-range" type="range" min="70" max="145" step="5" value="100">
            <output id="zoom-output">1.00</output>
          </label>
        </div>
      </div>

      <div class="panel builder-panel">
        <span class="input-label">Builder</span>
        <div class="range-grid">
          <label><span>Symmetry</span><input id="symmetry-range" type="range" min="3" max="12" step="1" value="6"><output id="symmetry-output">6</output></label>
          <label><span>Density</span><input id="density-range" type="range" min="1" max="9" step="1" value="6"><output id="density-output">6</output></label>
          <label><span>Orbits</span><input id="orbit-range" type="range" min="1" max="5" step="1" value="2"><output id="orbit-output">2</output></label>
          <label><span>Depth</span><input id="depth-range" type="range" min="0" max="6" step="1" value="1"><output id="depth-output">1</output></label>
          <label><span>Aura</span><input id="aura-range" type="range" min="1" max="9" step="1" value="5"><output id="aura-output">5</output></label>
          <label><span>Breath</span><input id="breath-range" type="range" min="1" max="9" step="1" value="4"><output id="breath-output">4</output></label>
        </div>
        <div class="action-row compact-row">
          <button id="variant-button" class="quiet-action" type="button">Variant</button>
          <button id="clear-gesture-button" class="quiet-action" type="button">Clear Trace</button>
          <button id="recipe-button" class="quiet-action" type="button">Recipe</button>
        </div>
      </div>

      <div class="panel layer-panel">
        <span class="input-label">Layers</span>
        <div id="layer-options" class="layer-grid" aria-label="Layer choices"></div>
      </div>

      <div class="panel tone-panel">
        <span class="input-label">Tone</span>
        <div id="tone-options" class="option-grid" aria-label="Tone choices"></div>
      </div>

      <div class="panel color-panel">
        <span class="input-label">Colours</span>
        <div class="color-row" aria-label="Chosen colours">
          <label><span>Core</span><input type="color" data-color-index="0" value="#f6d27a"></label>
          <label><span>Line</span><input type="color" data-color-index="1" value="#66e2cf"></label>
          <label><span>Aura</span><input type="color" data-color-index="2" value="#f08a7e"></label>
          <label><span>Ground</span><input type="color" data-color-index="3" value="#8ea7ff"></label>
        </div>
        <div id="palette-options" class="palette-row" aria-label="Palette choices"></div>
      </div>

      <div class="panel premium-panel">
        <span class="input-label">Premium Layer</span>
        <div class="select-row">
          <label>
            <span>Pack</span>
            <select id="premium-select" aria-label="Premium layer pack"></select>
          </label>
          <p id="premium-summary" class="premium-summary">Core creator</p>
        </div>
      </div>

      <div class="panel export-panel">
        <div class="export-grid" aria-label="Export formats">
          <button class="primary-action" type="button" data-export-format="card">Ritual Card</button>
          <button class="quiet-action" type="button" data-export-format="wallpaper">Wallpaper</button>
          <button class="quiet-action" type="button" data-export-format="square">Square</button>
          <button class="quiet-action" type="button" data-export-format="transparent">Transparent</button>
          <button id="export-recipe-button" class="quiet-action" type="button" data-export-format="recipe">Recipe</button>
        </div>
        <div class="action-row">
          <button id="save-button" class="primary-action" type="button">Save Glyph</button>
          <button id="share-button" class="quiet-action" type="button">Share Card</button>
        </div>
        <div id="saved-glyphs" class="saved-glyphs" aria-label="Saved glyphs"></div>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="./app.js?v=20260610-mobile-stage" defer></script>
</body>
</html>
