<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#07080d">
  <title>MirrorGate</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/mirrorgate-favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/mirrorgate-apple-touch-icon.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --panel: #10121c;
      --text: #e6e8f4;
      --muted: #9da2b8;
      --gold: #e0b452;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 30%, rgba(224, 180, 82, 0.12), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, 100%);
      border: 1px solid rgba(224, 180, 82, 0.22);
      border-radius: 18px;
      padding: 30px;
      background: rgba(16, 18, 28, 0.82);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 8vw, 3.2rem);
      letter-spacing: 0;
    }

    h1 strong {
      color: var(--gold);
      font-weight: 800;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 24px;
      padding: 0 22px;
      border-radius: 999px;
      background: rgba(224, 180, 82, 0.18);
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1><span>Mirror</span><strong>Gate</strong></h1>
    <p>MirrorGate is not available at this address. The current beta is private.</p>
    <a href="/">Return to coherence-nikolai.app</a>
  </main>
</body>
</html>
