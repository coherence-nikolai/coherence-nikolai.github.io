<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Harmonic Compass - Private Compass Instrument</title>
  <meta name="description" content="A private harmonic compass inspired by the works of Robert Edward Grant, with 24 original Compass Gates, Seed-Motion-Mirror-Return guidance, practice library, and journal memory field.">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#050913">
  <link rel="canonical" href="https://coherence-nikolai.app/harmonic_compass/">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=5">
</head>
<body>
  <div class="stellar-field" aria-hidden="true"></div>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Harmonic Compass navigation">
      <a class="brand" href="/harmonic_compass/" aria-label="Harmonic Compass home">
        <span class="brand-mark">HC</span>
        <span>
          <strong>Harmonic</strong>
          <small>Compass</small>
        </span>
      </a>

      <nav class="nav-list" aria-label="Primary">
        <button class="nav-item active" type="button" data-view="today">Today</button>
        <button class="nav-item" type="button" data-view="wheel">Wheel</button>
        <button class="nav-item" type="button" data-view="gates">Gates</button>
        <button class="nav-item" type="button" data-view="practices">Practices</button>
        <button class="nav-item" type="button" data-view="journal">Journal</button>
        <button class="nav-item" type="button" data-view="codex">Method</button>
        <button class="nav-item" type="button" data-view="guide">Guide</button>
        <button class="nav-item" type="button" data-view="export">Export</button>
      </nav>

      <div class="sidebar-foot">
        <span>Inspired by the works of Robert Edward Grant</span>
        <span>Independent paraphrased compass</span>
        <span>Private study instrument</span>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="source-line">Inspired by the works of Robert Edward Grant · independent private study instrument</p>
          <h1 id="view-title">Harmonic Compass</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" type="button" data-action="open-today">Today</button>
          <button class="primary-button" type="button" data-action="new-entry">New Entry</button>
        </div>
      </header>

      <section id="app-root" class="view-root" aria-live="polite"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js?v=5" defer></script>
</body>
</html>
