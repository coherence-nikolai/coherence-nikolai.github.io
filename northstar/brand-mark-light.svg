<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Northstar logo">
  <defs>
    <linearGradient id="northstar-light-stroke" x1="22" y1="72" x2="73" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24443F" />
      <stop offset="0.58" stop-color="#52756D" />
      <stop offset="1" stop-color="#B28D47" />
    </linearGradient>
    <radialGradient id="northstar-light-star" cx="42%" cy="30%" r="72%">
      <stop offset="0" stop-color="#FFF1BB" />
      <stop offset="0.56" stop-color="#D7AA54" />
      <stop offset="1" stop-color="#7F6236" />
    </radialGradient>
    <radialGradient id="northstar-light-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#D7AA54" stop-opacity="0.42" />
      <stop offset="1" stop-color="#D7AA54" stop-opacity="0" />
    </radialGradient>
    <filter id="northstar-light-shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.4" flood-color="#17201E" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    .northstar-light-sheen {
      animation: northstar-light-trace 8s ease-in-out infinite;
      stroke-dasharray: 12 120;
      stroke-dashoffset: 120;
    }

    .northstar-light-star,
    .northstar-light-halo {
      transform-box: fill-box;
      transform-origin: center;
    }

    .northstar-light-star {
      animation: northstar-light-star-breathe 7s ease-in-out infinite;
    }

    .northstar-light-halo {
      animation: northstar-light-glow-breathe 7s ease-in-out infinite;
    }

    @keyframes northstar-light-trace {
      0%, 46%, 100% {
        opacity: 0;
        stroke-dashoffset: 120;
      }

      58% {
        opacity: 0.42;
      }

      72% {
        opacity: 0;
        stroke-dashoffset: -16;
      }
    }

    @keyframes northstar-light-star-breathe {
      0%, 100% {
        transform: scale(1);
      }

      54% {
        transform: scale(1.045);
      }
    }

    @keyframes northstar-light-glow-breathe {
      0%, 100% {
        opacity: 0.16;
        transform: scale(0.95);
      }

      54% {
        opacity: 0.34;
        transform: scale(1.07);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .northstar-light-sheen,
      .northstar-light-star,
      .northstar-light-halo {
        animation: none;
      }

      .northstar-light-sheen {
        opacity: 0;
      }
    }
  </style>
  <circle class="northstar-light-halo" cx="70" cy="24" r="18" fill="url(#northstar-light-glow)" />
  <path
    d="M24 70V28L68 70V24"
    fill="none"
    stroke="#17201E"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="14"
    opacity="0.28"
  />
  <path
    d="M24 70V28L68 70V24"
    fill="none"
    stroke="url(#northstar-light-stroke)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="9.4"
    filter="url(#northstar-light-shadow)"
  />
  <path
    class="northstar-light-sheen"
    d="M24 70V28L68 70V24"
    fill="none"
    stroke="#FFF3CF"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="3.8"
  />
  <path
    class="northstar-light-star"
    d="M70 10.5L73.9 20.1L84 24L73.9 27.9L70 37.5L66.1 27.9L56 24L66.1 20.1Z"
    fill="url(#northstar-light-star)"
    stroke="#6F552B"
    stroke-linejoin="round"
    stroke-width="1.25"
    filter="url(#northstar-light-shadow)"
  />
</svg>
